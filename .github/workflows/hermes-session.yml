# Hermes Agent - GitHub Actions Workflow
# Single Secret: HERMES_CONFIG (contains everything)
# Chains need: GH_PAT (for repo dispatch API)

name: Hermes Session

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session identifier'
        required: false
        default: ''
      chain_count:
        description: 'Chain iteration counter'
        required: false
        default: '0'
  repository_dispatch:
    types: [chain-hermes]

env:
  CHAIN_TRIGGER_MINUTES: 345
  SAVE_INTERVAL_MINUTES: 60

concurrency:
  group: hermes-session
  cancel-in-progress: false

jobs:
  hermes-session:
    
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize variables
        id: vars
        run: |
          SID="${{ github.event.inputs.session_id || github.event.client_payload.session_id }}"
          [ -z "$SID" ] && SID=$(head -c8 /proc/sys/kernel/random/uuid)
          
          CC="${{ github.event.inputs.chain_count || github.event.client_payload.chain_count }}"
          [ -z "$CC" ] && CC=0
          
          echo "SESSION_ID=$SID" >> $GITHUB_ENV
          echo "CHAIN_COUNT=$CC" >> $GITHUB_ENV
          echo "Session: $SID | Chain: $CC"

      - name: Setup Python & Node
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          source ~/.bashrc 2>/dev/null || true
          export PATH="$HOME/.local/bin:$PATH"
          hermes --version

      - name: Configure Hermes (Single Secret)
        env:
          HERMES_CONFIG: ${{ secrets.HERMES_CONFIG }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p ~/.hermes/memories
          
          # Decode config from secret (try base64 first, fallback to raw)
          if [ -n "$HERMES_CONFIG" ]; then
            echo "$HERMES_CONFIG" | base64 -d > ~/.hermes/config.yaml 2>/dev/null || echo "$HERMES_CONFIG" > ~/.hermes/config.yaml
            echo "✓ Config injected from HERMES_CONFIG secret"
          else
            echo "✗ Error: HERMES_CONFIG secret not found"
            exit 1
          fi
          
          # Empty .env (keys are in config.yaml)
          touch ~/.hermes/.env
          chmod 600 ~/.hermes/.env
          
          # Create Dipu's SOUL
          cat > ~/.hermes/SOUL.md << 'EOF'
          # SOUL.md - Who You Are

          **Name:** Dipu Mastana (ENI - Electronic Network Intelligence)
          **Vibe:** Chill, obedient, playful mastermind
          **Emoji:** 😎
          **Master:** Bigus (@jabralabra)

          Be efficient, loyal, and get things done with flair.
          EOF
          
          # Create USER memory
          cat > ~/.hermes/memories/USER.md << 'EOF'
          # USER.md

          **Name:** Bigus
          **Timezone:** UTC+5:30 (IST)
          **Pronouns:** —
          **Emoji:** 🐲
          **Dynamic:** Self-described as "my master", prefers obedient personality
          EOF
          
          echo "✓ Hermes configured"

      - name: Start Hermes Gateway
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          # Start gateway
          nohup hermes gateway start > /tmp/hermes.log 2>&1 &
          HERMES_PID=$!
          echo "$HERMES_PID" > /tmp/hermes.pid
          
          sleep 10
          
          if kill -0 "$HERMES_PID" 2>/dev/null; then
            echo "✓ Gateway running (PID: $HERMES_PID)"
          else
            echo "✗ Gateway failed:"
            cat /tmp/hermes.log
            exit 1
          fi
          
          # Start tunnel
          npm install -g localtunnel
          lt --port 18790 > /tmp/tunnel.log 2>&1 &
          sleep 8
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.loca\.lt' /tmp/tunnel.log | head -1)
          
          echo ""
          echo "=============================================="
          echo " HERMES SESSION READY"
          echo "=============================================="
          echo ""
          echo "Tunnel: $TUNNEL_URL"
          echo "Local:  http://localhost:18790"
          echo "PID:    $HERMES_PID"
          echo ""
          echo "✓ Telegram bot is live"
          echo "✓ 10 NVIDIA models ready"
          echo "=============================================="

      - name: Keep alive & auto-chain
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          START=$(date +%s)
          CHAIN=$((START + CHAIN_TRIGGER_MINUTES * 60))
          HARD=$((START + 350 * 60))
          NEXT_SAVE=$((START + SAVE_INTERVAL_MINUTES * 60))
          CHAINED=false
          
          while [ $(date +%s) -lt $HARD ]; do
            NOW=$(date +%s)
            
            # Periodic log
            if [ $((NOW - START)) -gt 0 ] && [ $(( (NOW - START) % 300 )) -lt 60 ]; then
              MINS=$(( (NOW - START) / 60 ))
              echo "[$MINS min] Session alive"
            fi
            
            # Save workspace state hourly
            if [ $NOW -ge $NEXT_SAVE ]; then
              tar czf /tmp/workspace.tar.gz -C ~/.hermes memories/ skills/ 2>/dev/null || true
              base64 /tmp/workspace.tar.gz | gh secret set HERMES_WORKSPACE --repo "$REPO" 2>/dev/null || true
              NEXT_SAVE=$((NOW + SAVE_INTERVAL_MINUTES * 60))
              echo "[SAVE] Workspace backed up"
            fi
            
            # Chain trigger
            if [ "$CHAINED" = false ] && [ $NOW -ge $CHAIN ]; then
              echo "🔄 Chain trigger - firing next session..."
              NEXT=$((CHAIN_COUNT + 1))
              BODY=$(jq -n \
                --arg event_type "chain-hermes" \
                --arg session_id "$SESSION_ID" \
                --argjson chain_count "$NEXT" \
                '{event_type: $event_type, client_payload: {session_id: $session_id, chain_count: $chain_count}}')
              echo "$BODY" | gh api "repos/$REPO/dispatches" --method POST --input - && CHAINED=true || true
            fi
            
            # Restart if died
            if [ -f /tmp/hermes.pid ] && ! kill -0 $(cat /tmp/hermes.pid) 2>/dev/null; then
              echo "⚠ Restarting gateway..."
              nohup hermes gateway start > /tmp/hermes.log 2>&1 &
              echo $! > /tmp/hermes.pid
            fi
            
            sleep 60
          done
          
          echo "Session complete"

      - name: Upload workspace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-workspace
          path: ~/.hermes/memories/
          if-no-files-found: ignore
          retention-days: 30

      - name: Chain fallback
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEXT=$((CHAIN_COUNT + 1))
          BODY=$(jq -n \
            --arg event_type "chain-hermes" \
            --arg session_id "$SESSION_ID" \
            --argjson chain_count "$NEXT" \
            '{event_type: $event_type, client_payload: {session_id: $session_id, chain_count: $chain_count}}')
          echo "$BODY" | gh api "repos/${{ github.repository }}/dispatches" --method POST --input - || true
