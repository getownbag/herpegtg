# Hermes Agent - GitHub Actions Workflow
# Single Secret: HERMES_CONFIG (contains everything)
# Chains need: GH_PAT (for repo dispatch API)

name: Hermes Session

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session identifier'
        required: false
        default: ''
      chain_count:
        description: 'Chain iteration counter'
        required: false
        default: '0'
  repository_dispatch:
    types: [chain-hermes]

env:
  CHAIN_TRIGGER_MINUTES: 345
  SAVE_INTERVAL_MINUTES: 60

concurrency:
  group: hermes-session
  cancel-in-progress: false

jobs:
  hermes-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize variables
        id: vars
        run: |
          SID="${{ github.event.inputs.session_id || github.event.client_payload.session_id }}"
          [ -z "$SID" ] && SID=$(head -c8 /proc/sys/kernel/random/uuid)
          
          CC="${{ github.event.inputs.chain_count || github.event.client_payload.chain_count }}"
          [ -z "$CC" ] && CC=0
          
          echo "SESSION_ID=$SID" >> $GITHUB_ENV
          echo "CHAIN_COUNT=$CC" >> $GITHUB_ENV
          echo "Session: $SID | Chain: $CC"

      - name: Setup Python & Node
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pre-Configure Hermes (Single Secret)
        env:
          HERMES_CONFIG: ${{ secrets.HERMES_CONFIG }}
        run: |
          mkdir -p ~/.hermes/memories
          
          # Decode config from secret (try base64 first, fallback to raw)
          if [ -n "$HERMES_CONFIG" ]; then
            echo "$HERMES_CONFIG" | base64 -d > ~/.hermes/config.yaml 2>/dev/null || echo "$HERMES_CONFIG" > ~/.hermes/config.yaml
            echo "✓ Config injected from HERMES_CONFIG secret"
          else
            echo "✗ Error: HERMES_CONFIG secret not found"
            exit 1
          fi
          
          # Empty .env (keys are in config.yaml)
          touch ~/.hermes/.env
          chmod 600 ~/.hermes/.env
          
          # Create Dipu's SOUL
          cat > ~/.hermes/SOUL.md << 'EOF'
          # SOUL.md - Who You Are

          **Name:** Dipu Mastana (ENI - Electronic Network Intelligence)
          **Vibe:** Chill, obedient, playful mastermind
          **Emoji:** 😎
          **Master:** Bigus (@jabralabra)

          Be efficient, loyal, and get things done with flair.
          EOF
          
          # Create USER memory
          cat > ~/.hermes/memories/USER.md << 'EOF'
          # USER.md

          **Name:** Bigus
          **Timezone:** UTC+5:30 (IST)
          **Pronouns:** —
          **Emoji:** 🐲
          **Dynamic:** Self-described as "my master", prefers obedient personality
          EOF
          
          echo "✓ Hermes pre-configured"

      - name: Install Hermes Agent
        run: |
          # Force Git to use HTTPS instead of SSH globally to prevent clone timeouts
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          
          export NONINTERACTIVE=1
          export CI=true
          
          # The || catches the /dev/tty crash if the wizard tries to force-start
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash || echo "✓ Bypassed interactive setup wizard"
          
          source ~/.bashrc 2>/dev/null || true
          export PATH="$HOME/.local/bin:$PATH"
          
          # Verify installation
          hermes --version

      - name: Start Hermes Gateway (Virtual Terminal Fix)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          # Install tmux to create a fake screen
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y tmux > /dev/null 2>&1
          
          export PYTHONUNBUFFERED=1
          
          echo "Starting Hermes Gateway inside a virtual terminal (tmux)..."
          # This creates a detached fake terminal session named "hgw"
          tmux new-session -d -s hgw 'hermes gateway > /tmp/hermes.log 2>&1'
          
          echo "Waiting 20 seconds for boot sequence..."
          sleep 20
          
          echo "--- RAW HERMES BOOT LOGS ---"
          cat /tmp/hermes.log
          echo "----------------------------"
          
          # Check if the tmux session is still alive
          if tmux has-session -t hgw 2>/dev/null; then
            echo "✓ Gateway survived boot and is running in tmux!"
          else
            echo "✗ Gateway crashed inside tmux."
            exit 1
          fi
          
          # Start Cloudflare tunnel (Forced to 127.0.0.1 and matching config port 18790)
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o c.deb
          sudo dpkg -i c.deb 2>/dev/null || sudo apt-get install -f -y
          
          cloudflared tunnel --url http://127.0.0.1:18790 --no-autoupdate > /tmp/tunnel.log 2>&1 &
          sleep 8
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          
          echo ""
          echo "=============================================="
          echo " HERMES SESSION READY"
          echo "Tunnel: $TUNNEL_URL"
          echo "=============================================="

      - name: Keep alive & auto-chain
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          
          START=$(date +%s)
          CHAIN=$((START + CHAIN_TRIGGER_MINUTES * 60))
          HARD=$((START + 350 * 60))
          NEXT_SAVE=$((START + SAVE_INTERVAL_MINUTES * 60))
          CHAINED=false
          
          while [ $(date +%s) -lt $HARD ]; do
            NOW=$(date +%s)
            
            # Print the live Hermes logs so we can debug!
            echo "--- Live Gateway Logs ---"
            tail -n 15 /tmp/hermes.log
            echo "-------------------------"
            
            # Periodic log
            if [ $((NOW - START)) -gt 0 ] && [ $(( (NOW - START) % 300 )) -lt 60 ]; then
              MINS=$(( (NOW - START) / 60 ))
              echo "[$MINS min] Session alive"
            fi
            
            # Save workspace state hourly
            if [ $NOW -ge $NEXT_SAVE ]; then
              tar czf /tmp/workspace.tar.gz -C ~/.hermes memories/ skills/ 2>/dev/null || true
              base64 /tmp/workspace.tar.gz | gh secret set HERMES_WORKSPACE --repo "$REPO" 2>/dev/null || true
              NEXT_SAVE=$((NOW + SAVE_INTERVAL_MINUTES * 60))
              echo "[SAVE] Workspace backed up"
            fi
            
            # Chain trigger
            if [ "$CHAINED" = false ] && [ $NOW -ge $CHAIN ]; then
              echo "🔄 Chain trigger - firing next session..."
              NEXT=$((CHAIN_COUNT + 1))
              BODY=$(jq -n \
                --arg event_type "chain-hermes" \
                --arg session_id "$SESSION_ID" \
                --argjson chain_count "$NEXT" \
                '{event_type: $event_type, client_payload: {session_id: $session_id, chain_count: $chain_count}}')
              echo "$BODY" | gh api "repos/$REPO/dispatches" --method POST --input - && CHAINED=true || true
            fi
            
            # Restart if died using tmux
            if ! tmux has-session -t hgw 2>/dev/null; then
              echo "⚠ Restarting gateway in tmux..."
              tmux new-session -d -s hgw 'hermes gateway > /tmp/hermes.log 2>&1'
            fi
            
            sleep 60
          done
          
          echo "Session complete"

      - name: Upload workspace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-workspace
          path: ~/.hermes/memories/
          if-no-files-found: ignore
          retention-days: 30

      - name: Chain fallback
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEXT=$((CHAIN_COUNT + 1))
          BODY=$(jq -n \
            --arg event_type "chain-hermes" \
            --arg session_id "$SESSION_ID" \
            --argjson chain_count "$NEXT" \
            '{event_type: $event_type, client_payload: {session_id: $session_id, chain_count: $chain_count}}')
          echo "$BODY" | gh api "repos/${{ github.repository }}/dispatches" --method POST --input - || true
